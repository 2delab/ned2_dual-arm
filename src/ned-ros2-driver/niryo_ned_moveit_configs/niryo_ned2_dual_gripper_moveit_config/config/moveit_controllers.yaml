# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_1_controller
    - arm_2_controller
    - gripper_1_controller
    - gripper_2_controller

  arm_1_controller:
    type: FollowJointTrajectory
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    action_ns: follow_joint_trajectory
    default: true
  arm_2_controller:
    type: FollowJointTrajectory
    joints:
      - arm_2_joint_1
      - arm_2_joint_2
      - arm_2_joint_3
      - arm_2_joint_4
      - arm_2_joint_5
      - arm_2_joint_6
    action_ns: follow_joint_trajectory
    default: true
  gripper_1_controller:
    type: FollowJointTrajectory
    joints:
      - arm_1_joint_base_to_mors_1
      - arm_1_joint_base_to_mors_2
    action_ns: follow_joint_trajectory
    default: true
  gripper_2_controller:
    type: FollowJointTrajectory
    joints:
      - arm_2_joint_base_to_mors_1
      - arm_2_joint_base_to_mors_2
    action_ns: follow_joint_trajectory
    default: true
  dual_arm_controller:
    type: FollowJointTrajectory
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
      - arm_2_joint_1
      - arm_2_joint_2
      - arm_2_joint_3
      - arm_2_joint_4
      - arm_2_joint_5
      - arm_2_joint_6